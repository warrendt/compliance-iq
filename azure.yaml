# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
# =============================================================================
# ComplianceIQ — Root azure.yaml
# 
# The full deployment configuration lives in app/azure.yaml.
# This root file delegates to it so `azd up` works from the repo root.
# =============================================================================

name: compliance-iq
metadata:
  template: compliance-iq@1.0.0

infra:
  provider: bicep
  path: app/infra
  module: main

services:
  backend:
    project: app/backend
    host: containerapp
    language: python
    docker:
      path: ./Dockerfile
      context: .

  frontend:
    project: app/frontend
    host: containerapp
    language: python
    docker:
      path: ./Dockerfile
      context: .

hooks:
  preprovision:
    posix:
      shell: sh
      run: |
        echo "Pre-provisioning checks..."
        if ! command -v az &> /dev/null; then
          echo "Error: Azure CLI is not installed"
          exit 1
        fi
        echo "✓ Azure CLI found"
        if ! az account show &> /dev/null; then
          echo "Error: Not logged in to Azure. Run 'az login'"
          exit 1
        fi
        echo "✓ Azure authentication verified"

        echo ""
        echo "======================================"
        echo " Authentication Configuration"
        echo "======================================"
        if [ -n "${AUTH_CLIENT_ID}" ]; then
          echo "✓ Entra ID authentication ENABLED"
          echo "  Client ID: ${AUTH_CLIENT_ID}"
          echo "  Tenant ID: ${AUTH_TENANT_ID:-<deployment tenant>}"
        else
          echo "⚠ Entra ID authentication DISABLED"
          echo "  To enable, set these environment variables before deploying:"
          echo "    azd env set AUTH_CLIENT_ID <your-app-registration-client-id>"
          echo "    azd env set AUTH_TENANT_ID <your-tenant-id>"
        fi
      continueOnError: false

  postprovision:
    posix:
      shell: sh
      run: |
        echo ""
        echo "======================================"
        echo " Deployment Summary"
        echo "======================================"
        echo "Environment: ${AZURE_ENV_NAME}"
        echo "Resource Group: ${AZURE_RESOURCE_GROUP}"
        echo "Location: ${AZURE_LOCATION}"
        echo ""
        echo "Frontend URL: ${FRONTEND_URI}"
        echo "Backend URL: ${BACKEND_URI}"
        echo ""
        if [ -n "${AUTH_CLIENT_ID}" ]; then
          echo "Authentication: ✓ Entra ID enabled"
        else
          echo "Authentication: ⚠ Disabled (anonymous access)"
        fi
        echo ""
        echo "✓ Deployment complete!"
      continueOnError: true
