# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
# =============================================================================
# ComplianceIQ — Root azure.yaml
# 
# The full deployment configuration lives in app/azure.yaml.
# This root file delegates to it so `azd up` works from the repo root.
# =============================================================================

name: compliance-iq
metadata:
  template: compliance-iq@1.0.0

infra:
  provider: bicep
  path: app/infra
  module: main

services:
  backend:
    project: app/backend
    host: containerapp
    language: python
    docker:
      path: ./Dockerfile
      context: .

  frontend:
    project: app/frontend
    host: containerapp
    language: python
    docker:
      path: ./Dockerfile
      context: .

hooks:
  preprovision:
    posix:
      shell: sh
      run: |
        echo "Pre-provisioning checks..."
        if ! command -v az &> /dev/null; then
          echo "Error: Azure CLI is not installed"
          exit 1
        fi
        echo "✓ Azure CLI found"
        if ! az account show &> /dev/null; then
          echo "Error: Not logged in to Azure. Run 'az login'"
          exit 1
        fi
        echo "✓ Azure authentication verified"
      continueOnError: false

  postprovision:
    posix:
      shell: sh
      run: |
        echo ""
        echo "======================================"
        echo " Deployment Summary"
        echo "======================================"
        echo "Environment: ${AZURE_ENV_NAME}"
        echo "Resource Group: ${AZURE_RESOURCE_GROUP}"
        echo "Location: ${AZURE_LOCATION}"
        echo ""
        echo "Frontend URL: ${FRONTEND_URI}"
        echo "Backend URL: ${BACKEND_URI}"
        echo ""
        echo "✓ Deployment complete!"
      continueOnError: true
