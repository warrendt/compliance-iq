# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: compliance-iq
metadata:
  template: compliance-iq@1.0.0

infra:
  provider: bicep
  path: infra
  module: main

services:
  backend:
    project: ./backend
    language: python
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .
  
  frontend:
    project: ./frontend
    language: python
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .

hooks:
  preprovision:
    posix:
      shell: sh
      run: |
        echo "Pre-provisioning checks..."
        # Check for required tools
        if ! command -v az &> /dev/null; then
          echo "Error: Azure CLI is not installed"
          exit 1
        fi
        echo "✓ Azure CLI found"
        
        # Check Azure login
        if ! az account show &> /dev/null; then
          echo "Error: Not logged in to Azure. Run 'az login'"
          exit 1
        fi
        echo "✓ Azure authentication verified"

        # Prompt for Azure OpenAI model if not already set
        if [ -z "$AZURE_OPENAI_MODEL_NAME" ]; then
          echo ""
          echo "Select the Azure OpenAI model to deploy:"
          echo "  1) gpt-5.2       — enterprise agent: structured, auditable outputs [recommended]"
          echo "  2) gpt-5.4-pro   — most capable frontier model, complex professional work"
          echo "  3) gpt-5.4-mini  — cost-efficient, reliable everyday AI workloads"
          echo "  4) gpt-5.4-nano  — ultra-efficient, low-latency, cost-effective at scale"
          echo "  5) gpt-5.1       — logic-heavy and multi-step reasoning tasks"
          echo "  6) gpt-4.1       — proven, broadly available (stable fallback)"
          printf "Enter choice [1-6, default: 1]: "
          read -r MODEL_CHOICE
          case "$MODEL_CHOICE" in
            2)
              MODEL_NAME="gpt-5.4-pro"
              MODEL_VERSION="2026-04-01"
              ;;
            3)
              MODEL_NAME="gpt-5.4-mini"
              MODEL_VERSION="2026-04-01"
              ;;
            4)
              MODEL_NAME="gpt-5.4-nano"
              MODEL_VERSION="2026-04-01"
              ;;
            5)
              MODEL_NAME="gpt-5.1"
              MODEL_VERSION="2026-01-01"
              ;;
            6)
              MODEL_NAME="gpt-4.1"
              MODEL_VERSION="2025-04-14"
              ;;
            *)
              MODEL_NAME="gpt-5.2"
              MODEL_VERSION="2026-02-01"
              ;;
          esac
          azd env set AZURE_OPENAI_MODEL_NAME "$MODEL_NAME"
          azd env set AZURE_OPENAI_MODEL_VERSION "$MODEL_VERSION"
          echo "✓ Model set to: $MODEL_NAME (version: $MODEL_VERSION)"
          echo "  (Override at any time: azd env set AZURE_OPENAI_MODEL_NAME <name>)"
        else
          echo "✓ Using model: $AZURE_OPENAI_MODEL_NAME (already set)"
        fi
      continueOnError: false
  
  postprovision:
    posix:
      shell: sh
      run: |
        echo "Post-provisioning setup..."
        echo "======================================"
        echo "Deployment Summary:"
        echo "======================================"
        echo "Environment: ${AZURE_ENV_NAME}"
        echo "Resource Group: ${AZURE_RESOURCE_GROUP}"
        echo "Location: ${AZURE_LOCATION}"
        echo ""
        echo "Frontend URL: ${FRONTEND_URI}"
        echo "Backend URL: ${BACKEND_URI}"
        echo ""
        echo "✓ Deployment complete!"
        echo ""
        echo "Next steps:"
        echo "1. Configure Azure AD app registrations (if not done)"
        echo "2. Update redirect URIs in Azure Portal"
        echo "3. Visit the frontend URL to test the application"
        echo "4. Check logs: azd logs --service backend"
      continueOnError: true
