# Cloud Cybersecurity Controls (CCC-1:2020) template for Saudi NDMO/NCA
# Scope: CSP and CST controls. One entry per CCC control (main + grouped subcontrols).
# Fields are aligned to the AI mapping agent (ExternalControl baseline) and extended with
# Azure/Defender/Purview/Copilot/sovereignty hints. Azure policy items reference real
# built-in initiatives/features (no GUIDs to avoid drift); fill concrete definition IDs during mapping.

controls:
  - control_id: "1-1-P-1"
    entity: "CSP"
    domain: "Cybersecurity Governance"
    subdomain: "Roles and Responsibilities"
    title: "Define and approve cloud security roles and RACI"
    description: "Authorizing Official defines and approves cybersecurity roles and RACI for all cloud stakeholders."
    control_type: "Management"
    service_model: ["IaaS", "PaaS", "SaaS"]
    azure_policy_initiatives: ["MCSB_V2_PREVIEW"]
    defender_recommendations: ["Onboard subscriptions to Defender for Cloud", "Enable Defender for Cloud CSPM"]
    purview_controls: ["Document data owners for cloud services in Purview catalog"]
    copilot_guardrails: ["Restrict Copilot plugins to approved tenants/resources"]
    sovereignty_controls: "Operate in Saudi regions when available; ensure control plane access via private endpoints and Just-In-Time (PIM)."

  - control_id: "1-1-T-1"
    entity: "CST"
    domain: "Cybersecurity Governance"
    subdomain: "Roles and Responsibilities"
    title: "Define and approve tenant cloud security roles and RACI"
    description: "Authorizing Official defines and approves cybersecurity roles and RACI for tenant-side stakeholders."
    control_type: "Management"
    service_model: ["IaaS", "PaaS", "SaaS"]
    azure_policy_initiatives: ["MCSB_V2_PREVIEW"]
    defender_recommendations: ["Enable PIM for privileged roles", "Require MFA via Conditional Access"]
    purview_controls: ["Assign data owners and stewards in Purview"]
    copilot_guardrails: ["Block Copilot access to unclassified data domains"]
    sovereignty_controls: "Use private access for management; pin data residency to Saudi regions; block public admin endpoints."

  - control_id: "1-2-P-1"
    entity: "CSP"
    domain: "Cybersecurity Governance"
    subdomain: "Cybersecurity Risk Management"
    title: "Cloud risk methodology, thresholds, classification, and register"
    description: "Define acceptable cloud risk levels, include data classification, maintain and monitor a cloud risk register."
    control_type: "Management"
    service_model: ["IaaS", "PaaS", "SaaS"]
    azure_policy_initiatives: ["MCSB_V2_PREVIEW", "NIST_SP_800_53_R5"]
    defender_recommendations: ["Enable continuous export of security findings to Log Analytics/SIEM"]
    purview_controls: ["Use data classification to drive risk scoring"]
    copilot_guardrails: ["Deny Copilot on assets tagged high risk"]
    sovereignty_controls: "Risk register covers cross-border data flows; enforce regional restrictions."

  - control_id: "1-2-T-1"
    entity: "CST"
    domain: "Cybersecurity Governance"
    subdomain: "Cybersecurity Risk Management"
    title: "Tenant cloud risk methodology, thresholds, classification, and register"
    description: "Define acceptable cloud risk levels, include CST data classification, maintain cloud risk register."
    control_type: "Management"
    service_model: ["IaaS", "PaaS", "SaaS"]
    azure_policy_initiatives: ["MCSB_V2_PREVIEW"]
    defender_recommendations: ["Enable workload protection plans relevant to tenant services"]
    purview_controls: ["Label sensitive tenant data; apply DLP"]
    copilot_guardrails: ["Exclude classified datasets from Copilot index"]
    sovereignty_controls: "Constrain data residency; use private endpoints to CSP services."

  - control_id: "1-3-P-1"
