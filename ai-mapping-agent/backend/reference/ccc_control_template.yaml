    service_model: ["IaaS", "PaaS", "SaaS"]
    azure_policy_initiatives: ["NIST_SP_800_53_R5", "MCSB_V2_PREVIEW"]
    defender_recommendations: ["Regulatory compliance dashboard in Defender for Cloud"]
    purview_controls: ["Data residency and sovereignty policies in Purview"]
    copilot_guardrails: ["Block Copilot from data classified per KSA law"]
    sovereignty_controls: "Use sovereign landing zone patterns; restrict services to regional offerings allowed by NDMO/NCA."

