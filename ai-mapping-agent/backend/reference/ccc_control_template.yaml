    sovereignty_guidance:
      - "Residency: run and store data/logs/keys in Saudi regions/SPC; no cross-border replication unless formally approved."
      - "Access: management/control plane via private endpoints plus JIT/PIM; block public admin endpoints."
      - "Network: deny public network access on PaaS; prefer private endpoints and private peering; avoid public IPs on critical subnets."
      - "Encryption: CMK/HSM in-region; TLS >= 1.2; purge protection on Key Vault; no legacy auth."
      - "Logging/IR: send logs to in-region Log Analytics/Sentinel; keep IR artifacts in-region; follow national breach reporting."
      - "Third parties: private marketplace only; in-region processing; NDMO/NCA contract clauses and removal-on-request."
      - "DR/BCP: prefer in-country failover; document exceptions; keep backups and replicas in-region unless approved."

purview_label_catalog:
  - id: "L1-Top-Secret"
    description: "CCC Level 1 data; top secret; residency in Saudi regions only; HSM-backed keys; no external sharing."
  - id: "L2-Secret"
    description: "CCC Level 2 data; secret; residency in Saudi regions; encryption with customer-managed keys; limited sharing with approvals."
  - id: "L3-Confidential"
    description: "CCC Level 3 data; confidential; restrict to Saudi regions; encryption at rest/in transit; sharing by exception with DLP."
  - id: "L4-Public"
    description: "CCC Level 4 data; public; minimal restrictions but retain logging and integrity controls."
  - id: "L3-CNI-Restricted"
    description: "Confidential data tied to CNI; treat as high impact; enforce private endpoints, CMK, no cross-tenant sharing."

dlp_policy_catalog:
  - id: "D1-Block-External-ConfidentialPlus"
    description: "Block external sharing/upload for labels L1, L2, L3-CNI, and L3; allow monitored sharing only with approved domains."
  - id: "D2-Monitor-Egress-NonSaudi"
    description: "Monitor and alert on egress to non-Saudi endpoints; block for L1/L2."
  - id: "D3-Block-Unmanaged-Device-Downloads"
    description: "Block downloads for L1/L2/L3 data on unmanaged or non-compliant devices; require device compliance and encryption."
  - id: "D4-Encrypt-Email-ConfidentialPlus"
    description: "Auto-encrypt email/sharing for L1/L2/L3 data; require recipient MFA."
  - id: "D5-Deny-Copilot-Classified"
    description: "Prevent Copilot or plugins from accessing L1/L2/L3-CNI data; allow L3 by exception with approvals and audit."
  - id: "D6-Block-PII-Upload-Untrusted"
    description: "Block upload of PII/financial/health data to untrusted or third-party endpoints; apply to L2/L3."

